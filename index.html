<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Base44 App</title>
    <link rel="stylesheet" href="Design/CustomStyles.css"> <!-- אם יש CSS -->
</head>
<body>
    <div id="app">
        <h1>Welcome to Landing Page</h1>
        <p>הדגמה של דף הבית בלבד</p>
    </div>

    <script src="Design/CustomStyles.js"></script> <!-- JS מותאם אישית -->
    <script>
        // טעינת JSON של דף הבית לפי שם הקובץ של Base44
        fetch('Pages/Landing.json')
            .then(response => response.json())
            .then(data => {
                console.log('Landing Page Data:', data);
                const appDiv = document.getElementById('app');
                // הצגת תוכן הדף בצורה קריאה
                appDiv.innerHTML += `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            })
            .catch(err => {
                console.error('Error loading Landing.json:', err);
            });
    </script>
</body>
</html>
